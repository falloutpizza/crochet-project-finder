<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>what will you crochet today?</title>
    <link rel="icon" type="image/icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container-fluid">
        <div class="row home-top">
            <div class="home-top-col-left col">
                <h1>what will you crochet today?</h1>
            </div>
        </div>
        <div class="row main-content">
            <div class="filter-column col-sm-3 col-md-3 cos-lg-3">
                <form action="" method="post" class="filter-form" id="filter-form">
                    <h2 class="filter-heading">filter:</h2>
                    <div class="filter-level">
                        <h3><span class="underline">level</span>:</h3>
                        <label for="beginner">beginner</label>
                        <input type="checkbox" id="beginner" name="beginner" class="tag-check">
                        <label>|</label>

                        <label for="inter">intermediate</label>
                        <input type="checkbox" id="intermediate" name="intermediate" class="tag-check">
                        <label>|</label>

                        <label for="advanced">advanced</label>
                        <input type="checkbox" id="advanced" name="advanced" class="tag-check">
                        <label>|</label>

                    </div>
                    <div class="filter-time">
                        <h3><span class="underline">quick projects</span>:</h3>
                        <label for="<1hr">less than 1hr</label>
                        <input type="checkbox" id="<1hr" name="<1hr" class="tag-check">
                        <label>|</label>

                    </div>
                    <div class="filter-yarn">
                        <h3><span class="underline">amount of yarn needed</span>:</h3>
                        <label for="<50g">less than 50 grams</label>
                        <input type="checkbox" id="<50g" name="<50g" class="tag-check">
                        <label>|</label>

                        <label for="50-100g">50-100 grams</label>
                        <input type="checkbox" id="50-100g" name="50-100g" class="tag-check">
                        <label>|</label>

                        <label for="100-300g">100-300 grams</label>
                        <input type="checkbox" id="100-300g" name="100-300g" class="tag-check">
                        <label>|</label>

                        <label for="300-500g">300-500 grams</label>
                        <input type="checkbox" id="300-500g" name="300-500g" class="tag-check">
                        <label>|</label>

                        <label for="500+g">more than 500 grams</label>
                        <input type="checkbox" id="500+g" name="500+g" class="tag-check">
                        <label>|</label>

                    </div>

                    <div class="filter-type">
                        <h3><span class="underline">type of item</span>:</h3>
                        <label for="clothing">clothing</label>
                        <input type="checkbox" id="clothing" name="clothing" class="tag-check">
                        <label>|</label>

                        <label for="accessories">accessories</label>
                        <input type="checkbox" id="accessories" name="accessories" class="tag-check">
                        <label>|</label>

                        <label for="amigurumi">amigurumi</label>
                        <input type="checkbox" id="amigurumi" name="amigurumi" class="tag-check">
                        <label>|</label>

                        <label for="room decor">room decor</label>
                        <input type="checkbox" id="room decor" name="room decor" class="tag-check">
                        <label>|</label>

                        <label for="granny squares">granny squares</label>
                        <input type="checkbox" id="granny squares" name="granny squares" class="tag-check">
                        <label>|</label>

                        <label for="bags">bags</label>
                        <input type="checkbox" id="bags" name="bags" class="tag-check">
                        <label>|</label>

                    </div>

                    <button class="bttn">filter</button>
                </form>
            </div>
            <div class="projects-column col">
                <h2>projects(<span id="num-proj">0</span>):</h2>
                <div class="project-container" id="project-container">

                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
